name: Template Init

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  init:
    # Only run if this repo was created from the template (name differs)
    if: github.repository != 'nishio-n0522/sdd-template'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Replace template name with repo name
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          TEMPLATE_NAME="sdd-template"

          if [ "$REPO_NAME" = "$TEMPLATE_NAME" ]; then
            echo "Repo name is same as template. Skipping."
            exit 0
          fi

          echo "Replacing '$TEMPLATE_NAME' -> '$REPO_NAME'"

          # Target files to replace
          FILES=(
            ".devcontainer/devcontainer.json"
            ".devcontainer/README.md"
          )

          for file in "${FILES[@]}"; do
            if [ -f "$file" ]; then
              sed -i "s|$TEMPLATE_NAME|$REPO_NAME|g" "$file"
              echo "  Updated: $file"
            fi
          done

      - name: Remove this workflow
        run: rm -f .github/workflows/template-init.yml

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: initialize project from template"
            git push
          fi
